<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Video + Game Timer</title>

<style>

/* BACKGROUND ANIMASI */
body{
  font-family:Arial;
  margin:0;
  color:white;
  background:linear-gradient(270deg,#020024,#090979,#00d4ff);
  background-size:600% 600%;
  animation:bgmove 15s infinite;
}
@keyframes bgmove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* LAYOUT UTAMA */
.container{
  display:flex;
  height:100vh;
}

/* AREA VIDEO */
.video-area{
  width:50%;
  padding:20px;
  box-sizing:border-box;
}
.video-area .tiktok-embed{
  width:100%;
  max-width:480px;
  margin:auto;
}

/* AREA TIMER */
.timer-area{
  width:50%;
  padding:20px;
  box-sizing:border-box;
  overflow:auto;
}

/* PANEL INPUT TIMER */
.panel{
  background:rgba(0,0,0,0.5);
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}
input{
  padding:6px;
  margin:4px;
  border-radius:5px;
  border:none;
}
button{
  padding:7px 12px;
  margin:4px;
  border:none;
  border-radius:6px;
  background:cyan;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:orange;
}

/* KOTAK TIMER */
#timerContainer{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}
.timer{
  background:rgba(0,0,0,0.7);
  border:4px solid cyan;
  border-radius:18px;
  width:240px;
  height:170px;
  padding:12px;
  box-shadow:0 0 20px cyan;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
}

/* LOCKED TIMER */
.locked{
  border-color:orange;
  box-shadow:0 0 20px orange;
}

/* ANGKA TIMER */
.time{
  font-size:34px;
  font-weight:bold;
}

/* 10 DETIK TERAKHIR BERKEDIP */
.danger{
  color:red;
  animation:blink 0.6s infinite;
}
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* TIMER HABIS BERKEDIP TERUS */
.finish{
  background:#400;
  border-color:red;
  animation:flash 0.5s infinite;
}
@keyframes flash{
  0%{box-shadow:0 0 10px red;}
  50%{box-shadow:0 0 35px red;}
  100%{box-shadow:0 0 10px red;}
}

</style>
</head>

<body>

<div class="container">

  <!-- VIDEO TIKTOK -->
  <div class="video-area">
    <h2>🎬 Video</h2>

    <!-- TikTok Embed -->
    <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@fwiprojec/video/7536459151568801031" data-video-id="7536459151568801031" style="width: 100%; max-width: 480px;">
      <section> </section>
    </blockquote>
    <script async src="https://www.tiktok.com/embed.js"></script>

  </div>

  <!-- TIMER AREA -->
  <div class="timer-area">
    <h2>🎮 Game Timer</h2>

    <div class="panel">
      Nama
      <input id="name">
      Jam
      <input id="hour" type="number" value="0" style="width:60px">
      Menit
      <input id="minute" type="number" value="0" style="width:60px">
      Detik
      <input id="second" type="number" value="10" style="width:60px">
      <br>
      <button onclick="addTimer()">Tambah Timer</button>
      <button onclick="stopAlarm()">Stop Alarm</button>
    </div>

    <div id="timerContainer"></div>

  </div>

</div>

<!-- ALARM -->
<audio id="alarm" loop>
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

// --------------------------
// DATA TIMER
// --------------------------
let timers = [];
let interval = {};
let lockedTimers = {};

// --------------------------
// FORMAT WAKTU hh:mm:ss
// --------------------------
function format(sec){
  let h = Math.floor(sec/3600);
  let m = Math.floor((sec%3600)/60);
  let s = sec%60;
  return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
}

// --------------------------
// TAMBAH TIMER
// --------------------------
function addTimer(){
  let name = document.getElementById("name").value || "Timer";
  let total = (parseInt(hour.value)||0)*3600 + (parseInt(minute.value)||0)*60 + (parseInt(second.value)||0);
  let id = Date.now();
  timers.push({id,total,start:total});

  let div = document.createElement("div");
  div.className = "timer";
  div.id = "timer"+id;

  div.innerHTML = `
    <h3>${name}</h3>
    <div class="time" id="time${id}">${format(total)}</div>
    <div>
      <button onclick="startTimer(${id})">▶</button>
      <button onclick="pauseTimer(${id})">⏸</button>
      <button onclick="resetTimer(${id})">🔄</button>
      <button onclick="lockTimer(${id})">🔒</button>
      <button onclick="deleteTimer(${id})">🗑</button>
    </div>
  `;
  timerContainer.appendChild(div);
}

// --------------------------
// START TIMER
// --------------------------
function startTimer(id){
  let t = timers.find(x=>x.id==id);
  if(interval[id]) return;

  interval[id] = setInterval(()=>{
    if(t.total>0){
      t.total--;
      let timeEl = document.getElementById("time"+id);
      timeEl.innerText = format(t.total);
      if(t.total<=10) timeEl.classList.add("danger");
    }
    else{
      clearInterval(interval[id]);
      document.getElementById("alarm").play();
      let box = document.getElementById("timer"+id);
      box.classList.add("finish"); // berkedip terus
    }
  },1000);
}

// --------------------------
// PAUSE TIMER
// --------------------------
function pauseTimer(id){
  clearInterval(interval[id]);
  interval[id] = null;
}

// --------------------------
// RESET TIMER
// --------------------------
function resetTimer(id){
  if(lockedTimers[id]){
    alert("Timer sedang dikunci");
    return;
  }
  let t = timers.find(x=>x.id==id);
  pauseTimer(id);
  t.total = t.start;
  document.getElementById("time"+id).innerText = format(t.total);

  // stop effects
  let box = document.getElementById("timer"+id);
  box.classList.remove("finish");
  document.getElementById("time"+id).classList.remove("danger");
}

// --------------------------
// DELETE TIMER
// --------------------------
function deleteTimer(id){
  if(lockedTimers[id]){
    alert("Timer sedang dikunci");
    return;
  }
  pauseTimer(id);
  document.getElementById("timer"+id).remove();
  timers = timers.filter(t => t.id!=id);
}

// --------------------------
// LOCK TIMER
// --------------------------
function lockTimer(id){
  let box = document.getElementById("timer"+id);
  if(!lockedTimers[id]){
    lockedTimers[id] = true;
    box.classList.add("locked");
  } else {
    lockedTimers[id] = false;
    box.classList.remove("locked");
  }
}

// --------------------------
// STOP ALARM
// --------------------------
function stopAlarm(){
  let a = document.getElementById("alarm");
  a.pause();
  a.currentTime = 0;
}

</script>

</body>
</html>
